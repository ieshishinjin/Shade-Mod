# Done to increase the memory available to gradle.
# Disable system proxy to avoid "Connection refused" when proxy tools (Clash etc.) are not running.
# If you use a proxy, change / remove the lines below or start your proxy tool.
org.gradle.jvmargs=-Xmx1G -Djava.net.useSystemProxies=false -Dhttp.proxyHost= -Dhttps.proxyHost= -DsocksProxyHost=
org.gradle.parallel=true

# IntelliJ IDEA is not yet fully compatible with configuration cache, see: https://github.com/FabricMC/fabric-loom/issues/1349
org.gradle.configuration-cache=false

# Fabric Properties
# check these on https://fabricmc.net/develop
minecraft_version=1.21.1
loader_version=0.19.3
loom_version=1.17-SNAPSHOT

# Mod Properties
mod_version=0.0.2
maven_group=io.github.shade

# Dependencies
fabric_api_version=0.116.13+1.21.1
